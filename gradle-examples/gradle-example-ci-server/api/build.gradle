configurations {
    spi
}

dependencies {
    implementation project(':shared')
    implementation module("commons-lang:commons-lang:2.4") {
        dependency("commons-io:commons-io:1.2")
    }
    implementation group: 'org.apache.wicket', name: 'wicket', version: '1.3.7'
     testImplementation 'junit:junit:4.7'
    // API dependencies are visible to consumers when building
     testFixturesApi 'org.apache.commons:commons-lang:2.4'

    // Implementation dependencies are not leaked to consumers when building
     testFixturesImplementation 'org.apache.commons:commons-text:1.2'
}

// Just a smoke test that using this option does not lead to any exception
compileJava.options.compilerArgs = ['-Xlint:unchecked']
